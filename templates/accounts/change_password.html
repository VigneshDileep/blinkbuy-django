{% extends "base.html" %}
{% block content %}
{% load static %}


<section class="db-section">
  {% include 'include/alerts.html' %}

  <div class="container">
    <div class="row">
      {% include "include/dashboard_sidebar.html" %}

      <main class="col-md-9">
        <article class="db-wrapper">

          <!-- Header -->
          <header class="db-header">
            <div class="db-header-icon-ring">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
              </svg>
            </div>
            <div>
              <span class="db-header-eyebrow">Account Security</span>
              <span class="db-header-title">Change Your Password</span>
            </div>
          </header>

          <!-- Body -->
          <div class="db-body">
            <form action="{% url 'change_password' %}" method="POST" class="pw-form">
              {% csrf_token %}

              <!-- Current password -->
              <div class="field-group">
                <label class="field-label" for="id_current_password">Current Password</label>
                <div class="input-wrap">
                  <input type="password" id="id_current_password" name="current_password"
                         class="pw-input" autocomplete="current-password" placeholder="Enter current password">
                  <button type="button" class="eye-toggle" onclick="togglePw(this)" aria-label="Show password">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <!-- New password -->
              <div class="field-group">
                <label class="field-label" for="id_new_password">New Password</label>
                <div class="input-wrap">
                  <input type="password" id="id_new_password" name="new_password"
                         class="pw-input" autocomplete="new-password" placeholder="Min. 8 characters"
                         oninput="updateStrength(this.value)">
                  <button type="button" class="eye-toggle" onclick="togglePw(this)" aria-label="Show password">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    </svg>
                  </button>
                </div>
                <!-- Strength bar -->
                <div class="strength-bar-wrap" id="strengthBar">
                  <div class="strength-seg" id="seg1"></div>
                  <div class="strength-seg" id="seg2"></div>
                  <div class="strength-seg" id="seg3"></div>
                  <div class="strength-seg" id="seg4"></div>
                </div>
                <p class="field-hint" id="strengthLabel">Use 8+ characters with letters, numbers &amp; symbols.</p>
              </div>

              <!-- Confirm password -->
              <div class="field-group">
                <label class="field-label" for="id_confirm_password">Confirm New Password</label>
                <div class="input-wrap">
                  <input type="password" id="id_confirm_password" name="confirm_password"
                         class="pw-input" autocomplete="new-password" placeholder="Repeat new password">
                  <button type="button" class="eye-toggle" onclick="togglePw(this)" aria-label="Show password">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    </svg>
                  </button>
                </div>
              </div>

              <hr class="form-divider">

              <button type="submit" class="btn-save">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
                </svg>
                Update Password
              </button>

            </form>
          </div>

        </article>
      </main>
    </div>
  </div>
</section>

<script>
  /* ── Show/hide password toggle ── */
  function togglePw(btn) {
    const input = btn.previousElementSibling;
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    /* swap icon: open eye ↔ crossed eye */
    btn.innerHTML = isText
      ? `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
           <path stroke-linecap="round" stroke-linejoin="round"
             d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
           <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
         </svg>`
      : `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
           <path stroke-linecap="round" stroke-linejoin="round"
             d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>
         </svg>`;
  }

  /* ── Password strength bar ── */
  function updateStrength(val) {
    const segs   = [seg1, seg2, seg3, seg4];
    const label  = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8)              score++;
    if (/[A-Z]/.test(val))            score++;
    if (/[0-9]/.test(val))            score++;
    if (/[^A-Za-z0-9]/.test(val))    score++;

    const colors = ['', '#ef4444', '#f97316', '#eab308', '#10b981'];
    const labels = ['', 'Weak — add more variety', 'Fair — getting there', 'Good — almost strong', 'Strong password ✓'];

    segs.forEach((s, i) => {
      s.style.background = i < score ? colors[score] : 'var(--border)';
    });
    label.textContent = val.length ? labels[score] : 'Use 8+ characters with letters, numbers & symbols.';
    label.style.color = val.length ? colors[score] : 'var(--text-muted)';
  }
</script>

{% endblock %}
