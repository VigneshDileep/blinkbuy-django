{% extends "base.html" %}
{% block content %}
{% load static %}



<section class="auth-shell">
  <div>
    <div class="auth-card">
      <div class="auth-stripe">
        <div class="auth-stripe-icon">
          <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4"/><path d="M1.05 12H3m18 0h1.95M12 1.05V3m0 18v1.95M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M19.78 4.22l-1.42 1.42M5.64 18.36l-1.42 1.42"/>
          </svg>
        </div>
        <div class="auth-stripe-eyebrow">Account Recovery</div>
        <h4>Forgot your password?</h4>
        <p>Enter your email and we'll send you a reset link.</p>
      </div>

      <div class="auth-body">
        {% include 'include/alerts.html' %}
        <form action="{% url 'forgotPassword' %}" method="POST">
          {% csrf_token %}
          <div class="auth-field">
            <label class="auth-label">Email Address</label>
            <input type="email" name="email" placeholder="you@example.com">
          </div>
          <button type="submit" class="auth-btn">Send Reset Link</button>
        </form>
      </div>
    </div>

    <a href="{% url 'login' %}" class="auth-back">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Remembered it? Back to login
    </a>
    <p class="auth-footer">No account? <a href="{% url 'register' %}">Sign up</a></p>
  </div>
</section>

{% endblock %}
