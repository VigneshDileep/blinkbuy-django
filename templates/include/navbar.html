{% load static %}

<header class="navbar-modern">
  <div class="container">
    <div class="nav-inner">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="nav-logo" style="flex-shrink:0;">
        <img src="{% static 'images/logo2.png' %}" alt="Logo">
      </a>

      <!-- Categories -->
      <div class="cat-dropdown dropdown" style="flex-shrink:0;">
        <button class="cat-btn dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <i class="fa fa-th"></i> Categories
        </button>
        <div class="dropdown-menu">
          {% for category in links %}
            <a class="dropdown-item" href="{{ category.get_url }}">{{ category.category_name }}</a>
          {% endfor %}
        </div>
      </div>

      <!-- Store link -->
      <a href="{% url 'store' %}" class="nav-store-link" style="flex-shrink:0;">
        <i class="fa fa-shopping-bag" style="font-size:12px;"></i> Store
      </a>

      <!-- Search -->
      <div class="nav-search">
        <form action="{% url 'search' %}" method="GET">
          <div class="search-wrap">
            <input type="text" name="keyword" placeholder="Search products, brands and categories…">
            <button type="submit"><i class="fa fa-search"></i></button>
          </div>
        </form>
      </div>

      <!-- User -->
      <div style="flex-shrink:0;">
        {% if user.id is not None %}
          <div class="nav-user">
            <span class="welcome-text">Welcome, {{ user.first_name }}!</span>
            <div class="user-links">
              <a href="{% url 'dashboard' %}">Dashboard</a>
              <span class="sep">|</span>
              <a href="{% url 'logout' %}">Logout</a>
            </div>
          </div>
        {% else %}
          <div class="nav-user">
            <span class="welcome-text">Welcome, guest!</span>
            <div class="user-links">
              <a href="{% url 'login' %}">Sign in</a>
              <span class="sep">|</span>
              <a href="{% url 'register' %}">Register</a>
            </div>
          </div>
        {% endif %}
      </div>

      <!-- Cart -->
      <a href="{% url 'cart' %}" class="nav-cart" style="flex-shrink:0;">
        <i class="fa fa-shopping-cart"></i>
        {% if cart_count %}
          <span class="cart-badge">{{ cart_count }}</span>
        {% endif %}
      </a>

    </div>
  </div>
</header>
